<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MineClone 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;background:#000}
#gc{width:100vw;height:100vh;position:relative;font-family:'Courier New',monospace;overflow:hidden}
#menu{position:absolute;inset:0;background:linear-gradient(180deg,#1a6b8a 0%,#87ceeb 40%,#5a9e6f 70%,#3d7a47 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#menu h1{font-size:52px;font-weight:900;color:#fff;text-shadow:4px 4px 0 #000;letter-spacing:3px;margin-bottom:6px}
#menu .sub{color:#ddd;font-size:14px;margin-bottom:28px;text-shadow:1px 1px 0 #000}
.mbtn{width:270px;padding:12px 20px;margin:5px;font-size:14px;font-family:'Courier New',monospace;font-weight:bold;color:#fff;background:#4a8c4a;border:3px solid #000;border-bottom:5px solid #2a5c2a;border-right:5px solid #2a5c2a;cursor:pointer;text-transform:uppercase;letter-spacing:2px;text-shadow:1px 1px 0 #000}
.mbtn:hover{background:#5aac5a}.mbtn.br{background:#7a6a4a;border-bottom-color:#4a3a2a;border-right-color:#4a3a2a}.mbtn.br:hover{background:#9a8a6a}
#si{width:270px;padding:8px;font-family:'Courier New',monospace;font-size:13px;background:rgba(0,0,0,.55);color:#fff;border:2px solid #888;text-align:center;margin-bottom:6px;outline:none}
#sl{color:#fff;font-size:12px;text-shadow:1px 1px 0 #000;margin-bottom:6px}
#cw{width:100%;height:100%;display:none;position:relative}
#cv{display:block}
#ch{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;pointer-events:none;z-index:10}
#ch::before,#ch::after{content:'';position:absolute;background:rgba(255,255,255,.9)}
#ch::before{width:2px;height:100%;top:0;left:50%;transform:translateX(-50%)}
#ch::after{width:100%;height:2px;top:50%;left:0;transform:translateY(-50%)}
#hb{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;padding:6px;gap:3px;background:rgba(0,0,0,.5);z-index:10}
.slot{width:50px;height:50px;border:2px solid #555;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;flex-shrink:0}
.slot.act{border:2px solid #fff;box-shadow:0 0 0 1px #fff}
.scount{position:absolute;bottom:2px;right:3px;font-size:10px;font-weight:bold;color:#fff;text-shadow:1px 1px 0 #000}
#inf{position:absolute;top:8px;left:8px;color:#fff;font-size:11px;text-shadow:1px 1px 0 #000;background:rgba(0,0,0,.45);padding:6px 10px;line-height:1.8;z-index:10}
#bn{position:absolute;top:50%;left:50%;transform:translate(-50%,38px);color:#fff;font-size:12px;text-shadow:1px 1px 0 #000;background:rgba(0,0,0,.55);padding:3px 10px;display:none;white-space:nowrap;z-index:10}
#mb{position:absolute;top:50%;left:50%;transform:translate(-50%,58px);width:110px;height:5px;background:rgba(0,0,0,.5);display:none;z-index:10}
#mf{height:100%;width:0%;background:#e74}
/* drag-to-look zone */
#dlook{position:absolute;top:0;left:120px;right:150px;bottom:68px;z-index:5;touch-action:none;cursor:crosshair}
/* joystick */
#jpad{position:absolute;bottom:72px;left:10px;z-index:20}
#jbase{width:100px;height:100px;border-radius:50%;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);position:relative;touch-action:none}
#jknob{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.5);border:2px solid rgba(255,255,255,.7);position:absolute;top:30px;left:30px;pointer-events:none}
/* action buttons */
#abtn{position:absolute;bottom:72px;right:8px;z-index:20;display:flex;flex-direction:column;gap:5px}
.abtn{padding:9px 13px;background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.35);color:#fff;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;border-radius:3px;font-weight:bold;text-shadow:1px 1px 0 #000;touch-action:none;user-select:none}
.abtn:active{background:rgba(255,255,255,.2)}
#help{position:absolute;top:8px;right:8px;color:#fff;font-size:10px;text-shadow:1px 1px 0 #000;background:rgba(0,0,0,.45);padding:5px 8px;line-height:1.9;z-index:10}
</style>
</head>
<body>
<div id="gc">
  <div id="menu">
    <h1>⛏ MINECLONE</h1>
    <div class="sub">Edición 3D — Explorar &amp; Minar</div>
    <label id="sl">SEMILLA (vacío = aleatoria)</label>
    <input type="text" id="si" placeholder="Ej: 12345 o mi_mundo"/>
    <button class="mbtn" onclick="startGame(false)">▶ Crear Mundo Nuevo</button>
    <button class="mbtn br" onclick="startGame(true)">🌍 Mundo Aleatorio</button>
  </div>
  <div id="cw">
    <canvas id="cv"></canvas>
    <div id="ch"></div>
    <div id="bn"></div>
    <div id="mb"><div id="mf"></div></div>
    <div id="hb"></div>
    <div id="inf">
      <div id="pi">Pos: 0,0,0</div>
      <div id="sd">Semilla: -</div>
      <div id="fi">Mirando: Norte</div>
    </div>
    <div id="help">Arrastra centro → mirar<br>Joystick → mover<br>WASD → mover<br>⛏ Mantén → minar<br>🧱 Clic → colocar<br>↑ → saltar | 1-9 slot</div>
    <div id="dlook"></div>
    <div id="jpad"><div id="jbase"><div id="jknob"></div></div></div>
    <div id="abtn">
      <button class="abtn" id="btn-mine">⛏ Minar</button>
      <button class="abtn" id="btn-place">🧱 Colocar</button>
      <button class="abtn" id="btn-jump">↑ Saltar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   MineClone 3D — sin pointer lock, compatible con iframes
   ============================================================ */

const BTYPES={
  grass: {top:'#5a9e3a',side:'#7a6a4a',bot:'#8B6914',name:'Césped',hard:.8},
  dirt:  {top:'#8B6914',side:'#8B6914',bot:'#8B6914',name:'Tierra',hard:.6},
  stone: {top:'#888',   side:'#888',   bot:'#888',   name:'Piedra', hard:1.5},
  wood:  {top:'#a0784a',side:'#7a5a2a',bot:'#a0784a',name:'Madera', hard:1},
  leaves:{top:'#2a7a2a',side:'#2a7a2a',bot:'#2a7a2a',name:'Hojas',  hard:.3},
  sand:  {top:'#d4c07a',side:'#d4c07a',bot:'#d4c07a',name:'Arena',  hard:.5},
  water: {top:'#3a6aba',side:'#3a6aba',bot:'#3a6aba',name:'Agua',   hard:999},
  coal:  {top:'#444',   side:'#444',   bot:'#444',   name:'Carbón', hard:2},
  iron:  {top:'#9a7a6a',side:'#9a7a6a',bot:'#9a7a6a',name:'Hierro', hard:2.5},
  bedrock:{top:'#222',  side:'#222',   bot:'#222',   name:'Bedrock',hard:999}
};
const BCOL={};
for(const[k,v]of Object.entries(BTYPES))
  BCOL[k]={top:new THREE.Color(v.top),side:new THREE.Color(v.side),bot:new THREE.Color(v.bot)};

let scene,camera,renderer,rc,gameSeed=0;
const world={},chunks=new Set();
let player={x:0,y:20,z:0,pitch:0,yaw:0};
let yVel=0,onGround=false;
let inventory={},hotbar=new Array(9).fill(null),selSlot=0;
let mineTarget=null,mineTime=0,mineHeld=false,jumpPressed=false;
let jx=0,jz=0,lookDx=0,lookDy=0;
let keys={};

/* ---- RNG & Noise ---- */
function srng(seed){
  let s=typeof seed==='string'?seed.split('').reduce((a,c)=>a+c.charCodeAt(0),0):seed;
  return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646};
}
function snoise(x,z,sc){
  const ix=Math.floor(x/sc),iz=Math.floor(z/sc);
  const fx=x/sc-ix,fz=z/sc-iz;
  const h=(bx,bz)=>srng(gameSeed+bx*374761+bz*1234567)();
  const h00=h(ix,iz),h10=h(ix+1,iz),h01=h(ix,iz+1),h11=h(ix+1,iz+1);
  const sx=fx*fx*(3-2*fx),sz=fz*fz*(3-2*fz);
  return h00*(1-sx)*(1-sz)+h10*sx*(1-sz)+h01*(1-sx)*sz+h11*sx*sz;
}
function getH(x,z){return Math.floor(4+snoise(x,z,8)*6+snoise(x*2,z*2,4)*3+snoise(x*.3,z*.3,12)*8)}
function wk(x,y,z){return`${x},${y},${z}`}

/* ---- Block mesh ---- */
function mkMesh(type){
  const geo=new THREE.BoxGeometry(1,1,1);
  const c=BCOL[type]||BCOL.stone;
  const m=col=>new THREE.MeshLambertMaterial({color:col});
  const mats=[m(c.side),m(c.side),m(c.top),m(c.bot),m(c.side),m(c.side)];
  if(type==='water') mats.forEach(x=>{x.transparent=true;x.opacity=.6});
  if(type==='leaves')mats.forEach(x=>{x.transparent=true;x.opacity=.85});
  return new THREE.Mesh(geo,mats);
}
function placeB(x,y,z,type){
  const k=wk(x,y,z);
  if(world[k])scene.remove(world[k].mesh);
  const mesh=mkMesh(type);
  mesh.position.set(x,y,z);
  mesh.userData={type,x,y,z};
  scene.add(mesh);
  world[k]={mesh,type};
}
function removeB(x,y,z){
  const k=wk(x,y,z);
  if(!world[k])return;
  const t=world[k].type;
  scene.remove(world[k].mesh);
  delete world[k];
  addInv(t);
  updateHBUI();
}

/* ---- Inventory ---- */
function addInv(type){
  inventory[type]=(inventory[type]||0)+1;
  const ei=hotbar.findIndex(s=>s&&s.type===type);
  if(ei!==-1)hotbar[ei].count=inventory[type];
  else{const em=hotbar.findIndex(s=>!s);if(em!==-1)hotbar[em]={type,count:inventory[type]}}
}
function updateHBUI(){
  const hb=document.getElementById('hb');hb.innerHTML='';
  for(let i=0;i<9;i++){
    const s=document.createElement('div');
    s.className='slot'+(i===selSlot?' act':'');
    s.onclick=()=>{selSlot=i;updateHBUI()};
    if(hotbar[i]){
      const c=BCOL[hotbar[i].type];
      const cv=document.createElement('canvas');cv.width=28;cv.height=28;cv.style.cssText='width:28px;height:28px';
      const ctx=cv.getContext('2d');
      ctx.fillStyle='#'+c.top.getHexString();ctx.fillRect(3,3,22,9);
      ctx.fillStyle='#'+c.side.getHexString();ctx.fillRect(3,12,22,13);
      s.appendChild(cv);
      const cnt=document.createElement('div');cnt.className='scount';cnt.textContent=hotbar[i].count;s.appendChild(cnt);
    }
    hb.appendChild(s);
  }
}

/* ---- Chunk generation ---- */
function genChunk(cx,cz){
  const ck=`${cx}:${cz}`;if(chunks.has(ck))return;chunks.add(ck);
  const sz=16;
  for(let x=cx*sz;x<cx*sz+sz;x++){
    for(let z=cz*sz;z<cz*sz+sz;z++){
      const h=getH(x,z);
      const rng=srng(gameSeed^(x*7919)^(z*6271));
      for(let y=0;y<=h;y++){
        let t='stone';
        if(y===0)t='bedrock';
        else if(y===h)t=h<=3?'sand':'grass';
        else if(y>=h-3)t='dirt';
        else{const r=rng();if(r<.03)t='coal';else if(r<.045)t='iron'}
        placeB(x,y,z,t);
      }
      if(h<=3)for(let w=h+1;w<=3;w++)placeB(x,w,z,'water');
      if(h>3&&rng()<.04){
        const th=3+Math.floor(rng()*3);
        for(let ty=h+1;ty<=h+th;ty++)placeB(x,ty,z,'wood');
        for(let lx=-2;lx<=2;lx++)for(let lz=-2;lz<=2;lz++)for(let ly=-1;ly<=1;ly++)
          if(!world[wk(x+lx,h+th+ly,z+lz)])placeB(x+lx,h+th+ly,z+lz,'leaves');
      }
    }
  }
}

/* ---- Physics ---- */
function getFloor(x,y,z){
  const fx=Math.floor(x),fz=Math.floor(z);
  for(let cy=Math.floor(y);cy>=0;cy--){
    const b=world[wk(fx,cy,fz)];
    if(b&&b.type!=='water'&&b.type!=='leaves')return cy;
  }
  return 0;
}

/* ---- Raycast ---- */
function getTarget(){
  rc.setFromCamera({x:0,y:0},camera);
  const hits=rc.intersectObjects(Object.values(world).map(b=>b.mesh));
  return hits.length>0?hits[0]:null;
}

/* ---- Place block ---- */
function placeSelected(){
  if(!hotbar[selSlot])return;
  const hit=getTarget();if(!hit)return;
  const n=hit.face.normal,p=hit.object.userData;
  const nx=p.x+Math.round(n.x),ny=p.y+Math.round(n.y),nz=p.z+Math.round(n.z);
  if(world[wk(nx,ny,nz)])return;
  const t=hotbar[selSlot].type;
  inventory[t]--;
  if(inventory[t]<=0){delete inventory[t];hotbar[selSlot]=null}
  else hotbar[selSlot].count=inventory[t];
  placeB(nx,ny,nz,t);
  updateHBUI();
}

/* ---- Controls setup ---- */
function setupControls(){
  /* Keyboard */
  window.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(e.code.startsWith('Digit')){
      const n=+e.code.replace('Digit','')-1;
      if(n>=0&&n<9){selSlot=n;updateHBUI()}
    }
  });
  window.addEventListener('keyup',e=>{keys[e.code]=false});

  /* Drag-to-look (center area) */
  const dl=document.getElementById('dlook');
  let lookActive=false,lx=0,ly=0;
  const onLookStart=(cx,cy)=>{lookActive=true;lx=cx;ly=cy};
  const onLookMove=(cx,cy)=>{
    if(!lookActive)return;
    lookDx+=(cx-lx)*.004;lookDy+=(cy-ly)*.004;lx=cx;ly=cy;
  };
  const onLookEnd=()=>lookActive=false;
  dl.addEventListener('mousedown',e=>{onLookStart(e.clientX,e.clientY);e.preventDefault()});
  window.addEventListener('mousemove',e=>{onLookMove(e.clientX,e.clientY)});
  window.addEventListener('mouseup',onLookEnd);
  dl.addEventListener('touchstart',e=>{onLookStart(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});
  dl.addEventListener('touchmove',e=>{onLookMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});
  dl.addEventListener('touchend',onLookEnd);

  /* Joystick */
  const base=document.getElementById('jbase'),knob=document.getElementById('jknob');
  let jActive=false,jSx=0,jSy=0;const R=30;
  const jMove=(cx,cy)=>{
    let dx=cx-jSx,dy=cy-jSy;
    const d=Math.sqrt(dx*dx+dy*dy);if(d>R){dx=dx/d*R;dy=dy/d*R}
    knob.style.left=(30+dx)+'px';knob.style.top=(30+dy)+'px';
    jx=dx/R;jz=dy/R;
  };
  const jEnd=()=>{if(jActive){jActive=false;jx=0;jz=0;knob.style.left='30px';knob.style.top='30px'}};
  base.addEventListener('mousedown',e=>{jActive=true;const r=base.getBoundingClientRect();jSx=r.left+50;jSy=r.top+50;jMove(e.clientX,e.clientY);e.preventDefault()});
  window.addEventListener('mousemove',e=>{if(jActive)jMove(e.clientX,e.clientY)});
  window.addEventListener('mouseup',jEnd);
  base.addEventListener('touchstart',e=>{jActive=true;const r=base.getBoundingClientRect();jSx=r.left+50;jSy=r.top+50;jMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});
  base.addEventListener('touchmove',e=>{if(jActive)jMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});
  base.addEventListener('touchend',jEnd);

  /* Action buttons */
  const bm=document.getElementById('btn-mine');
  const bp=document.getElementById('btn-place');
  const bj=document.getElementById('btn-jump');
  bm.addEventListener('mousedown',()=>mineHeld=true);
  bm.addEventListener('touchstart',e=>{mineHeld=true;e.preventDefault()},{passive:false});
  window.addEventListener('mouseup',()=>{mineHeld=false;mineTarget=null;mineTime=0});
  window.addEventListener('touchend',()=>{mineHeld=false;mineTarget=null;mineTime=0});
  bp.addEventListener('click',placeSelected);
  bp.addEventListener('touchstart',e=>{placeSelected();e.preventDefault()},{passive:false});
  bj.addEventListener('mousedown',()=>jumpPressed=true);
  bj.addEventListener('touchstart',e=>{jumpPressed=true;e.preventDefault()},{passive:false});
}

/* ---- Update loop ---- */
function update(dt){
  /* Look */
  player.yaw  -=lookDx; lookDx=0;
  player.pitch-=lookDy; lookDy=0;
  player.pitch=Math.max(-Math.PI/2+.01,Math.min(Math.PI/2-.01,player.pitch));

  /* Move */
  const sp=5;
  const fw=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
  const rt=new THREE.Vector3( Math.cos(player.yaw),0,-Math.sin(player.yaw));
  const mv=new THREE.Vector3();
  if(keys['KeyW'])mv.add(fw);
  if(keys['KeyS'])mv.sub(fw);
  if(keys['KeyA'])mv.sub(rt);
  if(keys['KeyD'])mv.add(rt);
  mv.addScaledVector(fw,-jz).addScaledVector(rt,jx);
  if(mv.lengthSq()>0)mv.normalize().multiplyScalar(sp*dt);

  /* Gravity & jump */
  yVel-=18*dt;
  player.y+=yVel*dt;
  const fy=getFloor(player.x+mv.x,player.y,player.z+mv.z);
  if(player.y<fy+1.6){player.y=fy+1.6;yVel=0;onGround=true}else onGround=false;
  if((keys['Space']||jumpPressed)&&onGround){yVel=7;onGround=false}
  jumpPressed=false;
  player.x+=mv.x; player.z+=mv.z;

  /* Lazy chunk load */
  const cx=Math.floor(player.x/16),cz=Math.floor(player.z/16);
  for(let dx=-2;dx<=2;dx++)for(let dz=-2;dz<=2;dz++)genChunk(cx+dx,cz+dz);

  /* Camera */
  camera.quaternion.setFromEuler(new THREE.Euler(player.pitch,player.yaw,0,'YXZ'));
  camera.position.set(player.x,player.y+.7,player.z);

  /* HUD text */
  document.getElementById('pi').textContent=`Pos: ${Math.floor(player.x)}, ${Math.floor(player.y)}, ${Math.floor(player.z)}`;
  const ang=((player.yaw*180/Math.PI)%360+360)%360;
  document.getElementById('fi').textContent='Mirando: '+['Sur','SO','Oeste','NO','Norte','NE','Este','SE'][Math.floor((ang+22.5)/45)%8];

  /* Target block */
  const hit=getTarget();
  const bn=document.getElementById('bn');
  if(hit){bn.textContent=BTYPES[hit.object.userData.type]?.name||'?';bn.style.display='block'}
  else{bn.style.display='none';mineTarget=null}

  /* Mining */
  const mb=document.getElementById('mb'),mf=document.getElementById('mf');
  if(mineHeld&&hit){
    const t=hit.object.userData.type;
    if(t!=='bedrock'&&t!=='water'){
      if(mineTarget!==hit.object){mineTarget=hit.object;mineTime=0}
      mineTime+=dt;
      const hard=BTYPES[t]?.hard||1;
      mf.style.width=Math.min(mineTime/(hard*.5)*100,100)+'%';
      mb.style.display='block';
      if(mineTime>=hard*.5){
        removeB(mineTarget.userData.x,mineTarget.userData.y,mineTarget.userData.z);
        mineTarget=null;mineTime=0;mb.style.display='none';
      }
    }
  }else{mb.style.display='none';if(!mineHeld){mineTarget=null;mineTime=0}}
}

/* ---- Init ---- */
function initGame(){
  const canvas=document.getElementById('cv');
  const cw=document.getElementById('cw');
  canvas.width=cw.clientWidth;
  canvas.height=cw.clientHeight;

  scene=new THREE.Scene();
  scene.background=new THREE.Color('#87ceeb');
  scene.fog=new THREE.Fog('#87ceeb',22,60);

  camera=new THREE.PerspectiveCamera(75,canvas.width/canvas.height,.1,80);
  renderer=new THREE.WebGLRenderer({canvas,antialias:false});
  renderer.setSize(canvas.width,canvas.height);
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));

  scene.add(new THREE.AmbientLight(0xffffff,.65));
  const sun=new THREE.DirectionalLight(0xffffff,.9);sun.position.set(1,2,1);scene.add(sun);
  rc=new THREE.Raycaster();rc.far=6;

  for(let cx=-2;cx<=2;cx++)for(let cz=-2;cz<=2;cz++)genChunk(cx,cz);
  const sh=getH(0,0);
  player={x:0,y:sh+2,z:0,pitch:0,yaw:0};

  document.getElementById('sd').textContent='Semilla: '+gameSeed;
  document.getElementById('jpad').style.display='block';
  document.getElementById('abtn').style.display='flex';

  setupControls();
  updateHBUI();

  window.addEventListener('resize',()=>{
    canvas.width=cw.clientWidth;canvas.height=cw.clientHeight;
    camera.aspect=canvas.width/canvas.height;camera.updateProjectionMatrix();
    renderer.setSize(canvas.width,canvas.height);
  });

  let last=performance.now();
  (function loop(t){
    requestAnimationFrame(loop);
    const dt=Math.min((t-last)/1000,.05);last=t;
    update(dt);
    renderer.render(scene,camera);
  })(performance.now());
}

/* ---- Menu ---- */
function startGame(rand){
  const sv=document.getElementById('si').value.trim();
  gameSeed=rand||!sv
    ? Math.floor(Math.random()*999999)
    : isNaN(+sv)
      ? sv.split('').reduce((a,c)=>(a*31+c.charCodeAt(0))>>>0,0)
      : +sv;
  document.getElementById('menu').style.display='none';
  document.getElementById('cw').style.display='block';
  initGame();
}
</script>
</body>
</html>
